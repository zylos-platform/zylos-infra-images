name: kafka-connect-pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/zylos-platform/zylos-kafka-connect:latest
            ghcr.io/zylos-platform/zylos-kafka-connect:${{ github.sha }}

      - uses: actions/attest-build-provenance@v3
        if: github.event_name == 'push'
        with:
          subject-name: ghcr.io/zylos-platform/zylos-kafka-connect
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  update-gitops-repo:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: zylos-platform/zylos-infra-gitops
          token: ${{ secrets.GITOPS_REPO_PAT }}
          path: gitops-repo

      - name: Update Kustomize Image Tag
        working-directory: gitops-repo/components/platform/kafka-connect/base
        run: |
          kustomize edit set image ghcr.io/zylos-platform/zylos-kafka-connect=ghcr.io/zylos-platform/zylos-kafka-connect:${{ needs.build-and-push.outputs.image_sha }}

      - name: Create Pull Request in GitOps Repo
        uses: peter-evans/create-pull-request@v6
        with:
          path: gitops-repo
          token: ${{ secrets.GITOPS_REPO_PAT }}
          commit-message: "chore(kafka-connect): bump image to ${{ needs.build-and-push.outputs.image_sha }}"
          branch: "deploy/kafka-connect-${{ needs.build-and-push.outputs.image_sha }}"
          title: "Deploy: Update Kafka Connect Image"
          body: |
            Automated deployment triggered by merging a new Kafka Connect image.
            
            **Image:** \`ghcr.io/zylos-platform/zylos-kafka-connect:${{ needs.build-and-push.outputs.image_sha }}\`
            **Triggered by:** @${{ github.actor }}
          labels: "automated-deployment, kafka"
          delete-branch: true
