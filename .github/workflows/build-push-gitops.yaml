name: Reusable Build & GitOps Update

on:
  workflow_call:
    inputs:
      image_name:
        description: 'The name of the image (e.g., zylos-kafka-connect)'
        required: true
        type: string
      build_context:
        description: 'The directory containing the Dockerfile (e.g., ./kafka-connect)'
        required: true
        type: string
      gitops_path:
        description: 'The path in the GitOps repo to update (e.g., components/platform/kafka-connect/base)'
        required: true
        type: string
    secrets:
      GITOPS_REPO_PAT:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: ${{ inputs.build_context }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/zylos-platform/${{ inputs.image_name }}:latest
            ghcr.io/zylos-platform/${{ inputs.image_name }}:${{ github.sha }}

      - uses: actions/attest-build-provenance@v3
        if: github.event_name == 'push'
        with:
          subject-name: ghcr.io/zylos-platform/${{ inputs.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  update-gitops-repo:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: zylos-platform/zylos-infra-gitops
          token: ${{ secrets.GITOPS_REPO_PAT }}
          path: gitops-repo

      - name: Update Kustomize Image Tag
        working-directory: gitops-repo/${{ inputs.gitops_path }}
        run: |
          kustomize edit set image ghcr.io/zylos-platform/${{ inputs.image_name }}=ghcr.io/zylos-platform/${{ inputs.image_name }}:${{ needs.build-and-push.outputs.image_sha }}

      - name: Create Pull Request in GitOps Repo
        uses: peter-evans/create-pull-request@v6
        with:
          path: gitops-repo
          token: ${{ secrets.GITOPS_REPO_PAT }}
          commit-message: "chore(${{ inputs.image_name }}): bump image to ${{ needs.build-and-push.outputs.image_sha }}"
          branch: "deploy/${{ inputs.image_name }}-${{ needs.build-and-push.outputs.image_sha }}"
          title: "Deploy: Update ${{ inputs.image_name }} Image"
          body: |
            Automated deployment triggered by merging a new infrastructure image.
            **Image:** \`ghcr.io/zylos-platform/${{ inputs.image_name }}:${{ needs.build-and-push.outputs.image_sha }}\`
            **Triggered by:** @${{ github.actor }}
          labels: "automated-deployment"
          delete-branch: true
